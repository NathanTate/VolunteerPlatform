version: "3.9"

services:

  # ── SQL Server ──────────────────────────────────────────────────────────────
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: volunteer_sqlserver
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "Volunteer#DB2026!"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Volunteer#DB2026!' -Q 'SELECT 1' -No -C || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s
    networks:
      - volunteer_net

  # ── ASP.NET Core API ────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: VolunteerPlatform.API/Dockerfile
    container_name: volunteer_api
    environment:
      ASPNETCORE_ENVIRONMENT: "Docker"
      ConnectionStrings__DefaultConnection: >-
        Server=sqlserver,1433;Database=VolunteerPlatformDb;
        User Id=sa;Password=Volunteer#DB2026!;
        TrustServerCertificate=True;
      Jwt__Key: "VolunteerPlatformSuperSecretJwtKey2026!XYZ"
      Jwt__Issuer: "VolunteerPlatformAPI"
      Jwt__Audience: "VolunteerPlatformClient"
    ports:
      - "8080:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/live || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - volunteer_net

  # ── Angular (nginx) ─────────────────────────────────────────────────────────
  ui:
    build:
      context: ./volunteer-platform-ui
      dockerfile: Dockerfile
    container_name: volunteer_ui
    ports:
      - "4200:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - volunteer_net

volumes:
  sqlserver_data:

networks:
  volunteer_net:
    driver: bridge
